x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  redis-stack: 
    <<: *default-logging
    image: redis/redis-stack-server:latest
    container_name: redis-stack
    command: >
      redis-stack-server
      --appendonly yes
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
    restart: always
    mem_limit: 500m
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
      - "8001:8001"
    networks:
      - notesmanAI-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      - redis-stack
      - frontend
    networks:
      - notesmanAI-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  api:
    <<: *default-logging
    build: ./backend
    command: node dist/index.js
    container_name: api
    env_file: ./backend/.env
    depends_on:
    - redis-stack
    ports:
    - "4000:4000"
    networks:
    - notesmanAI-network
    restart: unless-stopped
    environment:
    - REDIS_HOST=redis-stack
    volumes:
    - temp_files:/app/public/temp

  upload-worker:
    <<: *default-logging
    build: ./backend
    command: npm run worker:upload
    container_name: upload-worker
    env_file: ./backend/.env
    depends_on:
    - api
    - redis-stack
    networks:
    - notesmanAI-network
    restart: always
    environment:
    - REDIS_HOST=redis-stack
    volumes:
    - temp_files:/app/public/temp

  qdrant-worker:
    <<: *default-logging
    build: ./backend
    command: npm run worker:qdrant
    container_name: qdrant-worker
    env_file: ./backend/.env
    depends_on:
    - api
    - redis-stack
    networks:
    - notesmanAI-network
    restart: always
    environment:
    - REDIS_HOST=redis-stack

  delete-worker:
    <<: *default-logging
    build: ./backend
    command: npm run worker:delete
    container_name: delete-worker
    env_file: ./backend/.env
    depends_on:
    - api
    - redis-stack
    networks:
    - notesmanAI-network
    restart: always
    environment:
    - REDIS_HOST=redis-stack

  save-message-worker:
    <<: *default-logging
    build: ./backend
    command: npm run worker:saveMessage
    container_name: save-message-worker
    env_file: ./backend/.env
    depends_on:
    - api
    - redis-stack
    networks:
    - notesmanAI-network
    restart: always
    environment:
    - REDIS_HOST=redis-stack

  get-message-worker:
    <<: *default-logging
    build: ./backend
    command: npm run worker:getMessage
    container_name: get-message-worker
    env_file: ./backend/.env
    depends_on:
    - api
    - redis-stack
    networks:
    - notesmanAI-network
    restart: always
    environment:
    - REDIS_HOST=redis-stack

  url-worker:
    <<: *default-logging
    build: ./backend
    command: npm run worker:url
    container_name: url-worker
    env_file: ./backend/.env
    depends_on:
    - api
    - redis-stack
    networks:
    - notesmanAI-network
    restart: always
    environment:
    - REDIS_HOST=redis-stack
    volumes:
    - temp_files:/app/public/temp


  frontend:
    <<: *default-logging
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_REDIRECT_API_URL=${NEXT_PUBLIC_REDIRECT_API_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file: .env
    ports:
    - "3000:3000"
    networks:
    - notesmanAI-network
    depends_on:
    - redis-stack
      

volumes:
  temp_files:
  redis_data:

networks:
  notesmanAI-network:
    driver: bridge
